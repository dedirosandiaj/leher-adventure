version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-file:./prisma/dev.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      # Persist database
      - ./prisma:/app/prisma
      # Persist uploads using named volume
      - uploads_data:/app/public/uploads
    restart: unless-stopped

volumes:
  uploads_data:
